[canvas]
width = 163
height = 257
top_decorative_strip_height = 21

[layout]
content_margin_left = 10
content_margin_right = 10
content_margin_top = 8
content_margin_bottom = 8
min_row_gap_y = 8
min_lane_gap_y = 8

[spacing]
default_sep_x = 2
default_sep_y = 2

skill_sep_x = 2
skill_sep_y = 2

and_gate_sep_x = 1
and_gate_sep_y = 1

generic_sep_x = 2
generic_sep_y = 2

road_lane_sep_y = 1

[forces]
source_pull_weight = 1.5
sink_pull_weight = 2.0
direct_vertical_source_weight = 3.0
direct_vertical_sink_weight = 4.0
boundary_repulsion_weight = 1.0
node_repulsion_weight = 1.0

[routing]
top_port_alignment_weight = 20
side_plus_top_alignment_weight = 50
non_aligned_top_entry_penalty = 20
bend_penalty = 10
crossing_penalty = 30
extra_lane_penalty = 12

[search]
x_candidate_step = 1
max_x_search_radius = 80

[logging]
enabled = true
log_to_console = true
log_to_file = true
level = INFO

[road_levels]
count = 2
level_1_name = boundary
level_1_rgba = auto
level_2_name = core
level_2_rgba = auto